<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>High Speed Camera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      -webkit-app-region: drag;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 16px rgba(99, 179, 237, 0.4));
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f7fafc;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #718096;
      margin-bottom: 36px;
    }

    .spinner-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #63b3ed;
      font-size: 13px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #2d3748;
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="icon">📷</div>
  <h1>High Speed Camera</h1>
  <p class="subtitle">MindVision Industrial Camera Tool</p>
  <div class="spinner-row">
    <div class="spinner"></div>
    <span>Starting Python server…</span>
  </div>
</body>
</html>
